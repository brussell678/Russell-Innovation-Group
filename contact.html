<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Russell Innovation Group</title>
    <meta
      name="description"
      content="Contact Russell Innovation Group for consulting, AI services, and collaboration opportunities."
    />
    <meta property="og:title" content="Contact | Russell Innovation Group" />
    <meta
      property="og:description"
      content="Reach Russell Innovation Group for project inquiries and partnership discussions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://russell-innovation-group.com/contact" />
    <meta property="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://russell-innovation-group.com/contact" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html">
          <img class="brand-logo" src="./logo.jpg" alt="Russell Innovation Group logo" />
          <span>
            Russell Innovation Group
            <small>Mission-Driven Technical Delivery</small>
          </span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a data-nav href="./index.html">Home</a>
          <a data-nav href="./about.html">About</a>
          <a data-nav href="./solutions.html">Solutions</a>
          <a data-nav href="./projects.html">Projects</a>
          <a data-nav href="./careers.html">Careers</a>
          <a data-nav href="./contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="panel form-wrap">
          <h1>Contact</h1>
          <p class="lead">
            Tell us about your mission, timeline, and constraints. We will follow up promptly.
          </p>

          <form
            id="contact-form"
            data-endpoint="/api/contact"
            method="post"
            novalidate
          >
            <label for="name">
              Name
              <input id="name" name="name" type="text" autocomplete="name" required />
              <span class="error" data-error-for="name"></span>
            </label>

            <label for="email">
              Email
              <input id="email" name="email" type="email" autocomplete="email" required />
              <span class="error" data-error-for="email"></span>
            </label>

            <label for="organization">
              Organization
              <input
                id="organization"
                name="organization"
                type="text"
                autocomplete="organization"
                required
              />
              <span class="error" data-error-for="organization"></span>
            </label>

            <label for="message">
              Message
              <textarea id="message" name="message" required></textarea>
              <span class="error" data-error-for="message"></span>
            </label>

            <label class="hidden" for="website">
              Website
              <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
            </label>

            <button class="btn btn-primary" type="submit">Submit</button>
            <p class="success" id="form-success" hidden></p>
          </form>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span>contact@russell-innovation-group.com</span>
        <span>&copy; 2026 Russell Innovation Group</span>
      </div>
    </footer>
    <script src="app.js?v=20260218" defer></script>
  </body>
</html>
